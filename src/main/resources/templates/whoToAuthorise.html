<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Who are you?</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button{
            display: inline-block;
            padding:15px 40px;
            font-size:18px;
            border:none;
            color:white;
            text-decoration: none;
            background:linear-gradient(45deg,#22CE83,#E8F1D4);
            border-radius:40px;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 0 15px #22CE83;

            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .button:hover{
            transform:scale(1.1);
            box-shadow:0 0 25px #22CE83, 0 0 50px #E8F1D4;
        }

    </style>
</head>
<body>
<div class="glass-box">
    <h1>Welcome to "Il-Forno-Classico Pizzeria"!</h1>
    <p>Choose your role below.</p>

    <form method="get" action="guestAuthorisation">
        <button class="button" type="submit">Guest</button>
    </form>

    <h3>Or</h3>
    <form method="get" action="employeeAuthorisation">
        <button class="button" type="submit">Staff</button>
    </form>
</div>
