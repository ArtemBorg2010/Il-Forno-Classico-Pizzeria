<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Authorisation</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div style="text-align: center; background-color: #FF7F50;">
    <h1>Sign up or log in</h1>
</div>
<form method="post" action="customerAuthorised">
    Name: <input type="text" name="name" id="name"><br>
    Phone: <input type="text" name="phone" id="phone"><br>
    <button type="submit">Log in</button>
</form>
</body>
</html>
