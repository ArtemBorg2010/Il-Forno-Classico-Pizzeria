<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Authorisation</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button{
            display: inline-block;
            padding:15px 40px;
            font-size:18px;
            border:none;
            color:white;
            text-decoration: none;
            background:linear-gradient(45deg,#22CE83,#E8F1D4);
            border-radius:40px;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 0 15px #22CE83;

            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .button:hover{
            transform:scale(1.1);
            box-shadow:0 0 25px #22CE83, 0 0 50px #E8F1D4;
        }
    </style>
</head>
<body>
<div class="glass-box">
    <h1>Welcome to "Il-Forno-Classico Pizzeria"!</h1>
    <h2>Log in</h2>
    <form method="post" action="guestLogin">
        <input type="text" name="nicknameLogin" id="nicknameLogin" placeholder="Nickname" class="glass-input"><br>
        <input type="password" name="passwordLogin" id="passwordLogin" placeholder="Password" class="glass-input"><br>
        <button class="button" type="submit">Log in</button>
    </form>

    <p>Or</p>
    <h2>Register</h2>
    <form method="post" action="guestRegister">
        <input type="text" name="name" id="name" placeholder="Name" class="glass-input"><br>
        <input type="text" name="phone" id="phone" placeholder="Phone number" class="glass-input"><br>
        <input type="text" name="nickname" id="nickname" placeholder="Nickname" class="glass-input"><br>
        <input type="password" name="password" id="password" placeholder="Password" class="glass-input"><br>
        <button class="button" type="submit">Register</button>
    </form>
</div>
</body>
</html>
