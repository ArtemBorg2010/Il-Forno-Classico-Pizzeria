<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
    </style>
</head>
<body>
<div style="text-align: center; background-color: #FF7F50;">
    <h1>Cart</h1>
</div>
<form method="get" action="menu">
    <button type="submit" class="button" align="center">To menu</button>
</form>
<table border="3px" bgcolor="#FF6347">
    <thead>
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Cost</th>
        <th>Rating</th>
        <th>Remove from cart</th>
    </tr>
    </thead>
    <tbody bgcolor="#FF7F50">
    <tr th:each="product,iter:${cart}">
        <td width="80" height="30"><h4 align="center" th:text="${product.getName()}"></h4></td>
        <td width="80" height="30"><h4 align="center" th:text="${product.getCategory()}"></h4></td>
        <td width="80" height="30"><h4 align="center" th:text="${product.getPrice()}"></h4></td>
        <td width="80" height="30"><h4 align="center" th:text="${product.getCost()}"></h4></td>
        <td width="80" height="30"><h4 align="center" th:text="${product.getRating()}"></h4></td>
        <td width="80" height="30"><a th:href="@{/removeFromCart/{index}(index=${iter.index})}" class="button">Remove</a></td>
    </tr>
    </tbody>
</table>
<form method="get" action="makeOrder">
    <button type="submit" class="button" align="center">Make an order</button>
</form>
</body>
</html>
